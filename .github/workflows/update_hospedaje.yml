name: Update Hospedaje Dashboard

on:
  schedule:
    # Lunes–viernes cada hora entre 8–16 hrs México (UTC-6 → 14–22 UTC)
    - cron: '0 14,15,16,17,18,19,20,21,22 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests xlrd

      - name: Ejecutar script de actualización
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
        run: python update_hospedaje.py

      - name: Commit y push de cambios
        uses: EndBug/add-and-commit@v9
        with:
          add: 'hospedaje.html'
          message: 'chore: actualizar hospedaje dashboard [skip ci]'
          default_author: github_actions
